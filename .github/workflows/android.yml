name: Android Build Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- NODE.JS & WEB BUILD ---
    - name: Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Dependencies
      run: npm install --no-audit --no-fund

    - name: Build Web Assets (Vite)
      run: npm run build

    - name: Verify dist/ Output
      run: |
        echo "--- dist/ contents ---"
        ls -la dist/
        test -f dist/index.html || (echo "FATAL: dist/index.html missing!" && exit 1)
        echo "✅ Web assets built successfully"

    # --- CAPACITOR SYNC ---
    - name: Sync Capacitor Android
      run: npx cap sync android

    - name: Verify Capacitor Sync
      run: |
        test -f android/app/src/main/assets/public/index.html || (echo "FATAL: Capacitor sync failed!" && exit 1)
        echo "✅ Capacitor sync completed"
        echo "--- Checking capacitor.build.gradle Java version ---"
        cat android/app/capacitor.build.gradle

    # --- JAVA & ANDROID SDK ---
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Verify Java Version
      run: |
        java -version
        javac -version
        echo "JAVA_HOME=$JAVA_HOME"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true

    # --- GRADLE BUILD (using project wrapper — production standard) ---
    - name: Make Gradle Wrapper Executable
      run: chmod +x android/gradlew

    - name: Build Debug APK
      working-directory: android
      run: |
        echo "--- Gradle wrapper properties ---"
        cat gradle/wrapper/gradle-wrapper.properties
        echo ""
        echo "--- Starting build ---"
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 || {
          echo "❌ Gradle build failed. Dumping diagnostics..."
          echo "--- build.gradle ---"
          cat build.gradle
          echo "--- app/build.gradle ---"
          cat app/build.gradle
          echo "--- app/capacitor.build.gradle ---"
          cat app/capacitor.build.gradle
          echo "--- variables.gradle ---"
          cat variables.gradle
          exit 1
        }

    - name: Verify APK Exists
      run: |
        APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
        test -f "$APK_PATH" || (echo "FATAL: APK not found!" && exit 1)
        APK_SIZE=$(stat -c%s "$APK_PATH")
        echo "✅ APK built: $(($APK_SIZE / 1024 / 1024)) MB"

    # --- ARTIFACT UPLOAD ---
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-mobile-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90

    # --- GITHUB RELEASE (One-URL Install) ---
    - name: Create/Update Latest Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Aura Mobile Native - Latest Build"
        body: |
          ## 📱 One-URL Install
          Download `app-debug.apk` below and open it on your Android device.
          - Commit: ${{ github.sha }}
          - Node.js: 22 | Java: 21 | Gradle: wrapper
        files: android/app/build/outputs/apk/debug/app-debug.apk
        prerelease: true
        make_latest: true
