name: Android Build Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- NODE.JS & WEB BUILD ---
    - name: Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Dependencies
      run: npm install --no-audit --no-fund

    - name: Verify Vite Build
      run: npm run build

    - name: Verify dist/ Output
      run: |
        echo "--- dist/ contents ---"
        ls -la dist/
        test -f dist/index.html || (echo "FATAL: dist/index.html missing!" && exit 1)
        echo "✅ Web assets built successfully"

    # --- CAPACITOR SYNC ---
    - name: Sync Capacitor Android
      run: npx cap sync android

    - name: Verify Capacitor Sync
      run: |
        test -f android/app/src/main/assets/public/index.html || (echo "FATAL: Capacitor sync failed - no index.html in assets!" && exit 1)
        echo "✅ Capacitor sync completed"

    # --- JAVA & ANDROID SDK ---
    # Java 21 is REQUIRED: Capacitor 8.x auto-generates JavaVersion.VERSION_21
    # in capacitor.build.gradle. Using Java 17 causes "invalid source release: 21".
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Verify Java Version
      run: |
        java -version
        echo "JAVA_HOME=$JAVA_HOME"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true

    # --- GRADLE BUILD ---
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.14.3'

    - name: Build Debug APK
      working-directory: android
      run: gradle assembleDebug --no-daemon --info

    - name: Verify APK Exists
      run: |
        APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
        test -f "$APK_PATH" || (echo "FATAL: APK not found at $APK_PATH!" && exit 1)
        APK_SIZE=$(stat -c%s "$APK_PATH")
        echo "✅ APK built successfully: $(($APK_SIZE / 1024 / 1024)) MB"
        echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

    # --- ARTIFACT UPLOAD ---
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-mobile-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90

    # --- GITHUB RELEASE (One-URL Install) ---
    # Creates a rolling "latest" release so the APK download URL stays constant.
    # Install on phone: download the APK from the release page and open it.
    - name: Create/Update Latest Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Aura Mobile Native - Latest Build"
        body: |
          ## 📱 One-URL Install

          Download `app-debug.apk` below and open it on your Android device.

          **Build info:**
          - Commit: ${{ github.sha }}
          - Date: ${{ github.event.head_commit.timestamp }}
          - Node.js: 22
          - Java: 21
          - Gradle: 8.14.3
        files: android/app/build/outputs/apk/debug/app-debug.apk
        prerelease: true
        make_latest: true
