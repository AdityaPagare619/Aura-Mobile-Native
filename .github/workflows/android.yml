name: Android Build Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- NODE.JS & WEB BUILD ---
    - name: Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Dependencies
      run: npm install --no-audit --no-fund

    - name: Verify Vite Build
      run: npm run build

    - name: Verify dist/ Output
      run: |
        echo "--- dist/ contents ---"
        ls -la dist/
        test -f dist/index.html || (echo "FATAL: dist/index.html missing!" && exit 1)
        echo "✅ Web assets built successfully"

    # --- CAPACITOR SYNC ---
    - name: Sync Capacitor Android
      run: npx cap sync android

    - name: Verify Capacitor Sync
      run: |
        test -f android/app/src/main/assets/public/index.html || (echo "FATAL: Capacitor sync failed - no index.html in assets!" && exit 1)
        echo "✅ Capacitor sync completed"

    # --- JAVA & ANDROID SDK ---
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true

    # --- GRADLE BUILD ---
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.14.3'

    - name: Build Debug APK
      working-directory: android
      run: gradle assembleDebug --no-daemon --info

    - name: Verify APK Exists
      run: |
        APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
        test -f "$APK_PATH" || (echo "FATAL: APK not found at $APK_PATH!" && exit 1)
        APK_SIZE=$(stat -c%s "$APK_PATH")
        echo "✅ APK built successfully: $(($APK_SIZE / 1024 / 1024)) MB"

    # --- ARTIFACT UPLOAD ---
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-mobile-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
